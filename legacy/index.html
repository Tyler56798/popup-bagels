<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PopUp Bagels — Lead Manager (CRM)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ============ TOP NAV ============ -->
  <header class="topnav">
    <div class="brand">
      <span class="brand-mark">🥯</span>
      <span class="brand-name">PopUp&nbsp;Bagels <em>Lead Manager</em></span>
    </div>
    <div class="topnav-tools">
      <div class="search">
        <span class="search-icon" aria-hidden="true">⌕</span>
        <input type="search" id="search" placeholder="Search buildings…" aria-label="Search buildings by name" />
      </div>
      <button type="button" id="add-btn" class="btn primary">+ Add building</button>
      <button type="button" id="reset-btn" class="btn ghost">Reset data</button>
    </div>
  </header>

  <!-- ============ STAT BAR ============ -->
  <section class="statbar" id="statbar" aria-label="Pipeline statistics"></section>

  <!-- ============ MAIN ============ -->
  <div class="layout">

    <!-- Left filter rail -->
    <aside class="rail" id="rail" aria-label="Filters">
      <div class="rail-head">
        <h2>Filters</h2>
        <button type="button" id="clear-filters" class="link-btn">Clear all</button>
      </div>

      <label class="rail-field">
        <span>Outreach stage</span>
        <select id="filter-stage"></select>
      </label>

      <label class="rail-field">
        <span>Submarket</span>
        <select id="filter-submarket"></select>
      </label>

      <label class="rail-field">
        <span>Pop-Up Viability</span>
        <select id="filter-viability"></select>
      </label>

      <label class="rail-field">
        <span>Outreach Wave</span>
        <select id="filter-wave"></select>
      </label>

      <label class="rail-check">
        <input type="checkbox" id="filter-magmile" />
        <span>Magnificent Mile cohort only</span>
      </label>

      <hr />

      <label class="rail-field">
        <span>Sort by</span>
        <select id="sort">
          <option value="score-desc">Lead Score (high → low)</option>
          <option value="pop-desc">Daytime Population (high → low)</option>
          <option value="name-asc">Building Name (A → Z)</option>
        </select>
      </label>
    </aside>

    <!-- Lead table -->
    <main class="content">
      <div class="content-head">
        <h2 id="result-count">Buildings</h2>
      </div>
      <div class="table-wrap">
        <table class="leads" id="leads-table">
          <thead>
            <tr>
              <th class="th-name">Building</th>
              <th>Submarket</th>
              <th>Class</th>
              <th class="th-num">Lead Score</th>
              <th>Viability</th>
              <th class="th-stage">Outreach Stage</th>
            </tr>
          </thead>
          <tbody id="leads-body"></tbody>
        </table>
        <div id="empty-state" class="empty" hidden></div>
      </div>
    </main>
  </div>

  <!-- ============ DETAIL SLIDE-IN PANEL ============ -->
  <div class="panel-overlay" id="panel-overlay" hidden></div>
  <aside class="detail-panel" id="detail-panel" aria-hidden="true" aria-label="Building detail">
    <div class="detail-head">
      <div>
        <h2 id="detail-title">—</h2>
        <p id="detail-sub" class="detail-sub"></p>
      </div>
      <button type="button" id="detail-close" class="icon-btn" aria-label="Close panel">✕</button>
    </div>
    <div class="detail-actions">
      <label class="inline-field">
        <span>Stage</span>
        <select id="detail-stage"></select>
      </label>
      <button type="button" id="detail-edit" class="btn ghost small">Edit</button>
      <button type="button" id="detail-delete" class="btn danger small">Delete</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </aside>

  <!-- ============ EDIT / ADD MODAL ============ -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-head">
        <h2 id="modal-title">Edit building</h2>
        <button type="button" id="modal-close" class="icon-btn" aria-label="Close">✕</button>
      </div>
      <form id="edit-form" novalidate>
        <input type="hidden" id="edit-id" />
        <div class="form-grid">
          <label class="ff">
            <span>Building Name</span>
            <input type="text" id="edit-name" />
            <em class="err" id="err-name"></em>
          </label>
          <label class="ff">
            <span>Street Address</span>
            <input type="text" id="edit-address" />
            <em class="err" id="err-address"></em>
          </label>
          <label class="ff">
            <span>Submarket</span>
            <input type="text" id="edit-submarket" />
          </label>
          <label class="ff">
            <span>Building Class</span>
            <input type="text" id="edit-class" />
          </label>
          <label class="ff">
            <span>Number of Floors</span>
            <input type="number" id="edit-floors" min="1" />
            <em class="err" id="err-floors"></em>
          </label>
          <label class="ff">
            <span>Lead Score (0–5)</span>
            <input type="number" id="edit-score" min="0" max="5" />
            <em class="err" id="err-score"></em>
          </label>
          <label class="ff">
            <span>Pop-Up Viability</span>
            <select id="edit-viability">
              <option value="strong">Strong</option>
              <option value="acceptable">Acceptable</option>
              <option value="weak">Weak</option>
              <option value="not_viable">Not Viable</option>
            </select>
          </label>
          <label class="ff">
            <span>Outreach Stage</span>
            <select id="edit-stage"></select>
          </label>
          <label class="ff wide">
            <span>Tenant Experience Contact</span>
            <input type="text" id="edit-tx" placeholder="Name, title" />
          </label>
          <label class="ff wide">
            <span>Notes</span>
            <textarea id="edit-notes" rows="3"></textarea>
          </label>
        </div>
        <div class="modal-foot">
          <button type="button" id="modal-cancel" class="btn ghost">Cancel</button>
          <button type="submit" class="btn primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ============ CONFIRM DIALOG ============ -->
  <div class="modal-overlay" id="confirm-overlay" hidden>
    <div class="modal small" role="alertdialog" aria-modal="true" aria-labelledby="confirm-title">
      <div class="modal-head"><h2 id="confirm-title">Are you sure?</h2></div>
      <p id="confirm-msg" class="confirm-msg"></p>
      <div class="modal-foot">
        <button type="button" id="confirm-no" class="btn ghost">Cancel</button>
        <button type="button" id="confirm-yes" class="btn danger">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Data first (defines window.POPUP_BAGELS_DATA), then app logic. -->
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
